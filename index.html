<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>Spotify</h2>
    <ul>
        <li>🏠 Home</li>
        <li>🔍 Search</li>
        <li>🎵 Your Library</li>
    </ul>
</div>

<div class="main-content">
    <h1>Good Evening</h1>

    <div class="songs-container">

        <div class="song-card">
            <img src="https://picsum.photos/200?1">
            <h3>Shape of You</h3>
            <p>Ed Sheeran</p>
            <button>▶ Play</button>
        </div>

        <div class="song-card">
            <img src="https://picsum.photos/200?2">
            <h3>Blinding Lights</h3>
            <p>The Weeknd</p>
            <button>▶ Play</button>
        </div>

        <div class="song-card">
            <img src="https://picsum.photos/200?3">
            <h3>Believer</h3>
            <p>Imagine Dragons</p>
            <button>▶ Play</button>
        </div>

        <div class="song-card">
            <img src="https://picsum.photos/200?4">
            <h3>Perfect</h3>
            <p>Ed Sheeran</p>
            <button>▶ Play</button>
        </div>

    </div>
</div>

</body>
</html>
