<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodieHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h2>FoodieHub</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Menu</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div>
            <h1>Delicious Food Delivered Fast</h1>
            <p>Order your favorite meals anytime, anywhere.</p>
            <button>Order Now</button>
        </div>
    </section>

    <section class="menu">

                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd" alt="">

                <p>₹149</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591" alt="">
                <h3>Pizza</h3>
                <p>₹299</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1628294895950-9805252327bc" alt="">
                <h3>Pasta</h3>
                <p>₹199</p>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 FoodieHub. All Rights Reserved.</p>
    </footer>

</html>
